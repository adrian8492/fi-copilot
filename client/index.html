    <!-- FAQ Schema for AEO (Answer Engine Optimization) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is F&I Co-Pilot?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "F&I Co-Pilot is an AI-powered real-time deal assistant built for automotive Finance and Insurance managers. It provides live audio transcription, compliance monitoring against federal and state regulations, script coaching, objection handling suggestions, and comprehensive performance analytics to help F&I managers close more deals with confidence."
          }
        },
        {
          "@type": "Question",
          "name": "How does F&I Co-Pilot help with compliance?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "F&I Co-Pilot monitors live deal conversations in real-time against 31+ federal regulations and ASURA proprietary compliance rules. It flags potential violations as they happen, giving F&I managers immediate feedback to correct course during the deal rather than discovering issues after the fact."
          }
        },
        {
          "@type": "Question",
          "name": "Can F&I Co-Pilot manage multiple dealership locations?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. F&I Co-Pilot supports multi-dealership group management with role-based access control. Dealership groups can manage multiple rooftops, and managers can switch between locations. Group admins see aggregated analytics across all their locations via the Eagle Eye View."
          }
        },
        {
          "@type": "Question",
          "name": "What analytics does F&I Co-Pilot provide?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "F&I Co-Pilot tracks key performance metrics including Per Vehicle Retailed (PVR), Products Per Deal (PPD), script fidelity scores, word track usage, compliance flags, and session completion rates. Managers can compare sessions, view scorecards, and identify coaching opportunities through the analytics dashboard."
          }
        }
      ]
    }
    </script>
